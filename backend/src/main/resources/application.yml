spring:
  application:
    name: brochure-cms
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:brochure_cms}
    username: ${POSTGRES_USER:cms_user}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  freemarker:
    template-loader-path: classpath:/templates/email/
    suffix: .html
    charset: UTF-8

server:
  port: ${SERVER_PORT:8080}

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  media:
    root: ${APP_MEDIA_ROOT:./media}
  mail:
    from: ${MAIL_FROM:noreply@localhost}
  jwt:
    secret: ${JWT_SECRET:change-me-use-512-bit-hex-secret-in-production-0123456789abcdef0123456789abcdef}
    expiry-days: ${JWT_EXPIRY_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  tenant:
    header-enabled: ${TENANT_HEADER_ENABLED:true}
  hcaptcha:
    secret: ${HCAPTCHA_SECRET:}
