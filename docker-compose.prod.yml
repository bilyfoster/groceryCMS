version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pickles-internal
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: db
    volumes:
      - media_data:/app/media
    depends_on:
      - db
    networks:
      - pickles-internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pickles-api.rule=Host(`pickles.1lpro.com`) && (PathPrefix(`/api`) || PathPrefix(`/media`))"
      - "traefik.http.routers.pickles-api.entrypoints=websecure"
      - "traefik.http.routers.pickles-api.tls=true"
      - "traefik.http.routers.pickles-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.pickles-api.loadbalancer.server.port=8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-0.1.0}
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pickles-app.rule=Host(`pickles.1lpro.com`)"
      - "traefik.http.routers.pickles-app.entrypoints=websecure"
      - "traefik.http.routers.pickles-app.tls=true"
      - "traefik.http.routers.pickles-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pickles-app.priority=5"
      - "traefik.http.services.pickles-app.loadbalancer.server.port=3000"
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:

networks:
  pickles-internal:
    driver: bridge
  traefik:
    external: true
