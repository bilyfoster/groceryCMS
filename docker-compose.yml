version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: brochure_cms
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cms_user -d brochure_cms']
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    build: ./backend
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: dev
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: brochure_cms
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: devpassword
      JWT_SECRET: dev-jwt-secret-change-in-production-must-be-at-least-64-characters-long
      JWT_EXPIRY_DAYS: 7
      APP_BASE_URL: http://localhost:3000
      APP_MEDIA_ROOT: /app/media
      APP_TENANT_HEADER_ENABLED: 'true'
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@localhost
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
